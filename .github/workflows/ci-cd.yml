# ═══════════════════════════════════════════════════════════════
# GitHub Actions - CI/CD Pipeline for Secret Santa Frontend
# ═══════════════════════════════════════════════════════════════
#
# Triggers:
#   - Push to main    → Build + Deploy Production
#   - Push to develop → Build + Deploy Staging
#   - Pull Request    → Build test
#
# ═══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Tests & Lint
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Security audit
        if: github.event_name == 'push'
        run: pnpm audit --audit-level=high || true

      - name: 🧹 Lint code
        run: pnpm lint

      - name: 📏 Typecheck
        run: pnpm typecheck

      - name: 🧪 Run tests
        run: pnpm test --coverage

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: 📋 Test Summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            echo "✅ Tests completed with coverage report" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage report generated" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Build & Push Docker Image
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag avec le nom de la branche
            type=ref,event=branch
            # Tag avec le SHA court du commit
            type=sha,prefix=
            # Tag 'latest' pour main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag 'staging' pour develop
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            # Tag 'production' pour main
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/main' }}

      - name: ⚙️ Determine API URL
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "API_URL=http://production.example.com" >> $GITHUB_ENV
          else
            echo "API_URL=http://staging.example.com" >> $GITHUB_ENV
          fi

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: 🐳 Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: 📝 Image summary
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Deploy to Staging
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://staging.example.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Verify SSH Secret exists
        run: |
          echo "### 🔐 Secrets Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "⚠️ SSH_PRIVATE_KEY secret is NOT set" >> $GITHUB_STEP_SUMMARY
            echo "::warning::SSH_PRIVATE_KEY secret is not configured. Add it for real deployment."
          else
            echo "✅ SSH_PRIVATE_KEY secret is configured" >> $GITHUB_STEP_SUMMARY
          fi

      - name: ✅ Staging deployment simulation
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Simulation completed (no VPS configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commands that would run:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/secret-santa" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.staging.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "🎉 Staging deployment simulation completed!"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Deploy to Production
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://production.example.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Verify SSH Secret exists
        run: |
          echo "### 🔐 Secrets Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "⚠️ SSH_PRIVATE_KEY secret is NOT set" >> $GITHUB_STEP_SUMMARY
            echo "::warning::SSH_PRIVATE_KEY secret is not configured. Add it for real deployment."
          else
            echo "✅ SSH_PRIVATE_KEY secret is configured" >> $GITHUB_STEP_SUMMARY
            echo "🔐 Key preview (first 50 chars): $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 50)..."
          fi

      - name: ✅ Production deployment simulation
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Simulation completed (no VPS configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commands that would run:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/secret-santa" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.production.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.production.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "🎉 Production deployment simulation completed!"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production"
